<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Stepik-like Site{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/course_detail.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/lesson.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/student_dashboard.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="navbar-logo">📚 Stepik</a>
            <ul class="nav-menu">
                <li class="nav-item"><a href="/" class="nav-link">Главная</a></li>
                <li class="nav-item"><a href="/courses" class="nav-link">Курсы</a></li>
                <li class="nav-item"><a href="/about" class="nav-link">О сайте</a></li>

                {% if session.get('user_id') %}
                    <li class="nav-item">
                        <a href="/dashboard" class="nav-link" style="color: #32c056; font-weight: bold;">
                            👤 Профиль ({{ session.get('first_name', 'Личный кабинет') }})
                        </a>
                    </li>
                    <li class="nav-item"><a href="/logout" class="nav-link">Выход</a></li>
                {% else %}
                    <li class="nav-item"><a href="/login" class="nav-link">Вход</a></li>
                {% endif %}

            </ul>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2024 Stepik-like Website. All rights reserved.</p>
    </footer>
</body>
</html>
