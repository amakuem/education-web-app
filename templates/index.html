{% extends "base.html" %}
{% block content %}
<body>
    <h1>Доступные курсы</h1>
    <div class="courses-grid">
        {% for course in courses %}
        <div class="course-card">
            <h3>{{ course.title }}</h3>
            <p>Категория: {{ course.category_name }}</p>
            <p>Цена: {{ course.price }} руб.</p>
            <a href="{{ url_for('course_detail', course_id=course.id) }}">Подробнее</a>
        </div>
        {% endfor %}
    </div>
</body>
{% endblock %}
